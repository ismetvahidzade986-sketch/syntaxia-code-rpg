name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax-check every script
        run: for f in js/*.js tests/*.js; do node --check "$f"; done
      - name: Verify all quest solutions pass their tests
        run: node tests/verify.js
